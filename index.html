<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Length Converter | Home Design Co.</title>
    <!-- นำเข้าฟอนต์จาก Google Fonts เพื่อความสวยงามและทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- เชื่อมโยงไฟล์ CSS ภายนอก -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ส่วนหัวของเว็บไซต์ (Header) -->
    <header>
        <div class="header-container">
            <div class="brand-wrapper">
                <span class="logo-icon">📐</span>
                <h1>Home Design Precision</h1>
            </div>
        </div>
    </header>

    <!-- ส่วนเนื้อหาหลัก (Main Content) -->
    <main>
        <div class="converter-card">
            <h2 class="card-title">เครื่องมือแปลงหน่วยความยาว</h2>

            <!-- ช่องกรอกข้อมูลตัวเลข -->
            <div class="form-group">
                <label for="inputValue">ระบุความยาวที่ต้องการแปลง:</label>
                <input type="number" id="inputValue" value="10" placeholder="ระบุตัวเลข..." inputmode="decimal">
            </div>

            <!-- โซนเลือกหน่วยวัด (จัดรูปแบบ Responsive) -->
            <div class="unit-selection-container">
                <!-- หน่วยต้นทาง -->
                <div class="form-group select-wrapper">
                    <label for="fromUnit">จากหน่วย (From):</label>
                    <select id="fromUnit">
                        <optgroup label="ระบบเมตริก">
                            <option value="mm">มิลลิเมตร (mm)</option>
                            <option value="cm" selected>เซนติเมตร (cm)</option>
                            <option value="m">เมตร (m)</option>
                            <option value="km">กิโลเมตร (km)</option>
                        </optgroup>
                        <optgroup label="ระบบอังกฤษ">
                            <option value="in">นิ้ว (in)</option>
                            <option value="ft">ฟุต (ft)</option>
                            <option value="yd">หลา (yd)</option>
                            <option value="mi">ไมล์ (mi)</option>
                        </optgroup>
                    </select>
                </div>

                <!-- ปุ่มสลับหน่วย (Swap Button) เพิ่มความสะดวกในการใช้งาน -->
                <div class="swap-button-container">
                    <button id="swapBtn" type="button" title="สลับหน่วย">🔄</button>
                </div>

                <!-- หน่วยปลายทาง -->
                <div class="form-group select-wrapper">
                    <label for="toUnit">ไปเป็นหน่วย (To):</label>
                    <select id="toUnit">
                        <optgroup label="ระบบเมตริก">
                            <option value="mm">มิลลิเมตร (mm)</option>
                            <option value="cm">เซนติเมตร (cm)</option>
                            <option value="m">เมตร (m)</option>
                            <option value="km">กิโลเมตร (km)</option>
                        </optgroup>
                        <optgroup label="ระบบอังกฤษ">
                            <option value="in">นิ้ว (in)</option>
                            <option value="ft" selected>ฟุต (ft)</option>
                            <option value="yd">หลา (yd)</option>
                            <option value="mi">ไมล์ (mi)</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- กล่องแสดงผลลัพธ์ (Result Box) -->
            <div class="result-box">
                <div class="result-title">ผลลัพธ์การแปลง</div>
                <div class="result-value" id="resultDisplay">0.3281 ฟุต (ft)</div>
            </div>
        </div>
    </main>

    <!-- ส่วนท้ายของเว็บไซต์ (Footer) -->
    <footer>
        <p>Copyright © 2026 <strong>Home Design Co.</strong> | Professional Engineering Tools.</p>
    </footer>

    <!-- เชื่อมโยงไฟล์ JavaScript ภายนอกไว้ด้านล่างสุด เพื่อให้โหลดหน้าเว็บได้เร็วขึ้น -->
    <script src="script.js"></script>
</body>
</html>
